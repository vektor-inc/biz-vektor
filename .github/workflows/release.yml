name: Release on Tag
on:
    push:
        tags:
            - '[0-9]+.[0-9]+.[0-9]+'

jobs:
    release:
        name: GitHub Release
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4
            - name: Create Release
              # softprops/action-gh-release v2.6.1 / v2
              uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe
              with:
                  generate_release_notes: true
